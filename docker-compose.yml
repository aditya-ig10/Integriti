version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: integriti_postgres
    environment:
      POSTGRES_USER: integriti
      POSTGRES_PASSWORD: password
      POSTGRES_DB: integriti_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - integriti_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: integriti_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - integriti_network

  # Elasticsearch
  elasticsearch:
    image: elasticsearch:8.11.0
    container_name: integriti_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - integriti_network

  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.15
    container_name: integriti_neo4j
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - integriti_network

  # Apache Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: integriti_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - integriti_network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: integriti_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - integriti_network

  # API Gateway (Development)
  api_gateway:
    build:
      context: .
      dockerfile: src/api/Dockerfile
    container_name: integriti_api_gateway
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://integriti:password@postgres:5432/integriti_dev
      - REDIS_URL=redis://redis:6379/0
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - redis
      - elasticsearch
      - neo4j
      - kafka
    volumes:
      - ./src:/app/src
      - ./configs:/app/configs
    networks:
      - integriti_network
    restart: unless-stopped

  # ML Detection Service
  detection_service:
    build:
      context: .
      dockerfile: src/core/detection/Dockerfile
    container_name: integriti_detection
    ports:
      - "8001:8001"
    environment:
      - ENVIRONMENT=development
      - ML_MODEL_PATH=/app/models
      - HF_HOME=/app/models/huggingface
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    volumes:
      - ./models:/app/models
      - ./src:/app/src
    networks:
      - integriti_network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Attribution Service
  attribution_service:
    build:
      context: .
      dockerfile: src/core/attribution/Dockerfile
    container_name: integriti_attribution
    ports:
      - "8002:8002"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://integriti:password@postgres:5432/integriti_dev
      - REDIS_URL=redis://redis:6379/2
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
    networks:
      - integriti_network

  # Intelligence Service
  intelligence_service:
    build:
      context: .
      dockerfile: src/core/intelligence/Dockerfile
    container_name: integriti_intelligence
    ports:
      - "8003:8003"
    environment:
      - ENVIRONMENT=development
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - neo4j
      - kafka
    volumes:
      - ./src:/app/src
    networks:
      - integriti_network

  # Web Dashboard (React Frontend)
  web_dashboard:
    build:
      context: .
      dockerfile: src/web/Dockerfile
    container_name: integriti_dashboard
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_WS_URL=ws://localhost:8000
    depends_on:
      - api_gateway
    volumes:
      - ./src/web:/app/src
      - /app/node_modules
    networks:
      - integriti_network

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: integriti_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    networks:
      - integriti_network

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: integriti_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - integriti_network

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  neo4j_data:
  neo4j_logs:
  kafka_data:
  prometheus_data:
  grafana_data:

networks:
  integriti_network:
    driver: bridge
